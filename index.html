    // Patch it to track all instances and resume on first user interaction.

      function Patched() { var c = new Orig(...arguments); contexts.push(c); return c; }
      Patched.prototype = Orig.prototype;
      window.AudioContext = Patched;
      if (window.webkitAudioContext) window.webkitAudioContext = Patched;
      function resume() { contexts.forEach(function(c) { if (c.state === 'suspended') c.resume(); }); }
