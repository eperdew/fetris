<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>fetris</title>
  <link data-trunk rel="rust" data-bin="fetris" data-wasm-opt="z" />
  <link data-trunk rel="copy-dir" href="assets" />
  <script>
    // Safari creates AudioContext in "suspended" state at startup.
    // Patch it to track all instances and resume on first user interaction.
    (function () {
      var Orig = window.AudioContext || window.webkitAudioContext;
      if (!Orig) return;
      var contexts = [];
      function Patched() { var c = new Orig(...arguments); contexts.push(c); return c; }
      Patched.prototype = Orig.prototype;
      window.AudioContext = Patched;
      if (window.webkitAudioContext) window.webkitAudioContext = Patched;
      function resume() { contexts.forEach(function(c) { if (c.state === 'suspended') c.resume(); }); }
      ['keydown', 'click', 'touchend'].forEach(function(e) { document.addEventListener(e, resume, { passive: true }); });
    })();
  </script>
  <style>
    /* The Rust-side `clamp_window_to_max_texture_size` system sets the wgpu
       surface (and therefore the canvas's framebuffer) to half the browser's
       natural device-pixel resolution, capped at WebGL2's spec-minimum
       2048x2048. winit will write the halved size to `canvas.style.width/height`
       as part of that path; `!important` here forces the canvas DOM to keep
       filling the tab regardless, so the browser GPU-upscales the smaller
       framebuffer to full size. */
    html, body { margin: 0; padding: 0; background: #0a0a12; width: 100%; height: 100%; overflow: hidden; }
    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body>
  <canvas id="bevy-canvas"></canvas>
</body>
</html>
